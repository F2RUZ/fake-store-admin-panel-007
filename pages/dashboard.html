<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />
    <link rel="stylesheet" href="../styles/dashboard.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="sidebar">
        <ul>
          <li>
            <a href="#"> Products </a>
          </li>
          <li>
            <a href="#"> Users </a>
          </li>
          <li>
            <a href="#"> Carts </a>
          </li>
        </ul>
      </div>

      <form class="form">
        <input
          required
          class="image"
          name="image"
          type="url"
          placeholder="rasm manzili yoz"
        />
        <input class="title" name="title" type="text" placeholder="title" />
        <input
          required
          class="price"
          name="price"
          type="number"
          placeholder="narxini yoz"
        />
        <input
          required
          class="category"
          name="category"
          type="text"
          placeholder="categoriyani yoz"
        />
        <input
          required
          class="tavsif"
          name="tavsif"
          type="text"
          placeholder="tavsiv yoz"
        />

        <div>
          <button type="reset" class="cancel">Cansel</button>
          <button type="submit" class="submit">Qo'shish</button>
        </div>
      </form>

      <div class="container">
        <div class="navbar">
          <h1>Admin-panel</h1>
          <input type="search" placeholder="Write anything in site !" />
        </div>
        <table>
          <thead>
            <tr>
              <th>T/R</th>
              <th>Image</th>
              <th>Title</th>
              <th>Price</th>
              <th>Category</th>
              <th>Descriptions</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/toastify-js"
    ></script>
    <script src="../utils/products.js"></script>
  </body>
</html>
